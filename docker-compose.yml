# Local PostgreSQL for the Churn Prediction Engine.
# Config comes from the .env file (see .env.example). Nothing AWS-coupled here —
# this is a self-contained local dev database.
services:
  db:
    image: postgres:16
    container_name: churn_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      # host:container — host port also driven by .env so it never clashes.
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
